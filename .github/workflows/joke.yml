name: Update Daily Joke

on:
  schedule:
    - cron: "0 0 * * *"   # Runs every day
  workflow_dispatch:

jobs:
  update-joke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Get Joke
        run: |
          curl -s https://official-joke-api.appspot.com/random_joke > joke.json
          setup=$(jq -r '.setup' joke.json)
          punchline=$(jq -r '.punchline' joke.json)
          joke="$setup $punchline"
          echo "$joke" > joke.txt

      - name: Update README
        run: |
          joke=$(cat joke.txt)
          sed -i "/<!--START_JOKE-->/, /<!--END_JOKE-->/c\<!--START_JOKE-->\n$joke\n<!--END_JOKE-->" README.md

      - name: Commit Changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add README.md
          git commit -m "Updated daily joke" || echo "No changes"
          git push
