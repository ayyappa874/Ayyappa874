name: Update Daily Joke

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-joke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Get Joke
        run: |
          JOKE=$(curl -s https://official-joke-api.appspot.com/jokes/programming/random | jq -r '.[0].setup + " " + .[0].punchline')
          sed -i "/<!-- JOKE:START -->/,/<!-- JOKE:END -->/c\<!-- JOKE:START -->\n$JOKE\n<!-- JOKE:END -->" README.md

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add README.md
          git commit -m "Updated daily joke" || exit 0
          git push
