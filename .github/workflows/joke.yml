name: Daily Joke Update

on:
  schedule:
    - cron: "0 0 * * *"   # runs daily
  workflow_dispatch:

jobs:
  update-joke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Fetch Joke
        run: |
          joke=$(curl -s https://official-joke-api.appspot.com/random_joke | jq -r '"\(.setup) \(.punchline)"')
          echo "JOKE=$joke" >> $GITHUB_ENV

      - name: Update README
        run: |
          sed -i "/<!--START_JOKE-->/, /<!--END_JOKE-->/c\<!--START_JOKE-->\n$JOKE\n<!--END_JOKE-->" README.md

      - name: Commit Changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add README.md
          git commit -m "Updated daily joke" || echo "No changes"
          git push
